```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatKing AI</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#070b14;
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    background:#111827;
    padding:15px;
    text-align:center;
}

.logo{
    font-size:32px;
    font-weight:bold;
}

.logo span{
    color:#ff8c00;
}

.chat-area{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
    max-width:75%;
}

.bot{
    background:#1f2937;
}

.user{
    background:#ff8c00;
    margin-left:auto;
}

.input-area{
    display:flex;
    padding:15px;
    background:#111827;
}

#msg{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
}

button{
    margin-left:10px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#ff8c00;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <div class="logo">👑 Chat<span>King</span></div>
    <p>Criado por Luís Felipe Lira e Daniel Perez</p>
</header>

<div class="chat-area" id="chat">
    <div class="message bot">
        Olá! Eu sou o ChatKing AI. Faça uma pergunta.
    </div>
</div>

<div class="input-area">
    <input id="msg" type="text" placeholder="Digite sua mensagem...">
    <button onclick="enviar()">Enviar</button>
</div>

<script>

function enviar(){

    let campo = document.getElementById("msg");
    let texto = campo.value.trim();

    if(texto === ""){
        return;
    }

    let chat = document.getElementById("chat");

    chat.innerHTML += `
        <div class="message user">
            ${texto}
        </div>
    `;

    let pergunta = texto.toLowerCase();
    let resposta = "";

    if(pergunta.includes("oi") || pergunta.includes("olá")){
        resposta = "Olá! Como posso ajudar?";
    }
    else if(pergunta.includes("tudo bem")){
        resposta = "Estou muito bem!";
    }
    else if(pergunta.includes("nome")){
        resposta = "Meu nome é ChatKing AI.";
    }
    else if(pergunta.includes("quem criou você")){
        resposta = "Fui criado por Luís Felipe Lira e Daniel Perez.";
    }
    else if(pergunta.includes("hora")){
        resposta = "Agora são " + new Date().toLocaleTimeString();
    }
    else if(pergunta.includes("data")){
        resposta = "Hoje é " + new Date().toLocaleDateString();
    }
    else if(pergunta.includes("piada")){
        resposta = "Por que o computador foi ao médico? Porque ele estava com um vírus!";
    }
    else{
        resposta = "Ainda estou aprendendo. Tente outra pergunta.";
    }

    setTimeout(function(){

        chat.innerHTML += `
            <div class="message bot">
                ${resposta}
            </div>
        `;

        chat.scrollTop = chat.scrollHeight;

    },500);

    campo.value = "";
}

document.getElementById("msg").addEventListener("keydown", function(event){
    if(event.key === "Enter"){
        enviar();
    }
});

</script>

</body>
</html>
