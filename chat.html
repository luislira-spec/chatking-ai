```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ChatKing AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#070b14;
    color:white;
    height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    background:#0d1322;
    padding:20px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,.1);
}

.logo{
    font-size:32px;
    font-weight:800;
}

.logo span{
    color:#ff8c00;
}

.sub{
    color:#aaa;
    font-size:14px;
}

.chat-area{
    flex:1;
    overflow-y:auto;
    padding:25px;
}

.message{
    max-width:75%;
    padding:15px;
    border-radius:16px;
    margin-bottom:15px;
}

.bot{
    background:#101827;
}

.user{
    background:#ff8c00;
    margin-left:auto;
}

.input-area{
    display:flex;
    padding:20px;
    background:#0d1322;
    gap:10px;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#101827;
    color:white;
}

button{
    background:#ff8c00;
    border:none;
    color:white;
    padding:15px 25px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:.9;
}

</style>
</head>

<body>

<header>
    <div class="logo">👑 Chat<span>King</span></div>
    <div class="sub">Criado por Luís Felipe Lira e Daniel Perez</div>
</header>

<div class="chat-area" id="chat">

    <div class="message bot">
        Olá! Eu sou o ChatKing AI. Como posso ajudar você hoje?
    </div>

</div>

<div class="input-area">

    <input
        id="msg"
        type="text"
        placeholder="Digite sua mensagem..."
    >

    <button onclick="enviar()">
        Enviar
    </button>

</div>

<script>

function enviar(){

    let campo=document.getElementById("msg");

    if(campo.value.trim()==""){
        return;
    }

    let chat=document.getElementById("chat");

    chat.innerHTML += `
    <div class="message user">
        ${campo.value}
    </div>
    `;

    setTimeout(()=>{

        chat.innerHTML += `
        <div class="message bot">
            Esta é uma resposta de demonstração do ChatKing AI.
        </div>
        `;

        chat.scrollTop=chat.scrollHeight;

    },600);

    campo.value="";

}

</script>

</body>
</html>
